{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />

    <title>Mon Projet - Connexion</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cloudflare.com" />

    <!-- Google Fonts Roboto -->
    <link rel="stylesheet" href="https://googleapis.com" />

    <!-- MDB -->
    <link rel="stylesheet" href="{% static 'css/mdb.min.css' %}" />

    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .form-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body data-mdb-theme="dark">

    <div class="login-container py-5">
        <div class="container">
            <div class="row justify-content-center align-items-center">

                <!-- Colonne Formulaire -->
                <div class="col-lg-5 col-md-6 mb-5 mb-md-0">
                    <div class="card form-card p-4">
                        <div class="card-body">

                            <!-- Système d'alertes Django -->
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show text-center mb-4 shadow-sm" role="alert">
                                        <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} me-2"></i>
                                        {{ message }}
                                        <button type="button" class="btn-close" data-mdb-dismiss="alert" aria-label="Close"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}

                            <h3 class="text-center mb-4">Login</h3>

                            <form class="needs-validation" novalidate method="post">
                                {% csrf_token %}

                                <!-- Username -->
                                <div class="form-outline mb-4" data-mdb-input-init>
                                    <input type="text"
                                           class="form-control"
                                           id="username"
                                           name="username"
                                           required
                                           value="{{ form.username.value|default:'' }}" />
                                    <label class="form-label" for="username">Username</label>
                                    <div class="invalid-feedback">This field is required.</div>
                                </div>

                                <!-- Password -->
                                <div class="form-outline mb-4" data-mdb-input-init>
                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           name="password"
                                           required />
                                    <label class="form-label" for="password">Password</label>
                                    <div class="invalid-feedback">This field is required.</div>
                                </div>

                                <!-- Checkbox & Forgot Password alignés -->
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="remember" />
                                        <label class="form-check-label" for="remember">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="{% url 'password_reset' %}" class="text-muted small">Forgot password?</a>
                                </div>

                                <button type="submit"
                                        class="btn btn-primary btn-block mb-4"
                                        data-mdb-ripple-init>
                                    Login
                                </button>

                                <!-- Liens d'inscription séparés -->
                                <div class="text-center">
                                    <p class="mb-0">
                                        <a href="{% url 'register' %}" class="text-muted">Don't have an account ? Create one!</a>
                                    </p>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>

                <!-- Colonne Image -->
                <div class="col-lg-6 col-md-6 d-none d-md-block">
                    <img src="{% static 'images/bmp.png' %}"
                         alt="Illustration"
                         class="img-fluid rounded-5 shadow-4"
                         style="max-height: 580px; object-fit: cover;">
                </div>

            </div>
        </div>
    </div>

    <!-- MDB JS -->
    <script type="text/javascript" src="{% static 'js/mdb.umd.min.js' %}"></script>

    <!-- Script d'origine rétabli pour éviter le crash du thème sombre -->
    <script>
        document.querySelectorAll('.form-outline').forEach((formOutline) => {
            new mdb.Input(formOutline).update();
        });
    </script>

</body>
</html>
