{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-5-strong hover-shadow bg-dark text-white rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-bold mb-3 text-center text-uppercase">Forgot your password ?</h3>
                    <p class="text-muted mb-4 text-center">
                        Enter your email address to receive a secure reset link.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        {% if form.email.errors %}
                            <div class="alert alert-danger p-2 small mb-3">
                                {{ form.email.errors }}
                            </div>
                        {% endif %}

                        <!-- Champ Email style MDB -->
                        <div class="form-outline mb-4" data-mdb-input-init>
                            <input type="email" name="email" id="id_email" class="form-control form-control-lg text-white" required />
                            <label class="form-label" for="id_email"><i class="fas fa-envelope me-2"></i>Email address</label>
                        </div>

                        <!-- Bouton de soumission -->
                        <button class="btn btn-outline-light btn-lg w-100 btn-rounded mb-3" type="submit" data-mdb-ripple-init>
                            Send the link
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <p class="mb-0 small text-muted">Do you remember that ? <a href="{% url 'login' %}" class="text-white-50 fw-bold">Log in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
