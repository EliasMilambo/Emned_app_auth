{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-5-strong hover-shadow bg-dark text-white rounded-4 text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-paper-plane fa-3x text-info"></i>
                    </div>
                    <h3 class="fw-bold mb-3 text-uppercase">Email sent !</h3>
                    <p class="text-muted mb-4">
                        We have sent you an email containing instructions for setting up a new password.
                    </p>
                    <p class="small text-warning mb-4">
                        <i class="fas fa-exclamation-triangle me-1"></i> Remember to check your junk mail (spam) folder.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-info btn-lg btn-rounded w-100" data-mdb-ripple-init>
                        Return to the login page
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
