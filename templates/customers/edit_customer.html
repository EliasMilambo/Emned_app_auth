{% extends 'base.html' %}

{% block content %}
    <section class="container py-2">
        <form method="POST">
            {% csrf_token %}
            <div class="row">
              <div class="col">
                <!-- Name input -->
                <div data-mdb-input-init class="form-outline">
                    {{ form.first_name }}
                  <label class="form-label" for="form8Example1">First name</label>
                </div>
              </div>
              <div class="col">
                <!-- Email input -->
                <div data-mdb-input-init class="form-outline">
                  {{ form.email }}
                  <label class="form-label" for="form8Example2">Email address</label>
                </div>
              </div>
            </div>

            <hr />

            <div class="row">
          <div class="col">
            <!-- Name input -->
            <div data-mdb-input-init class="form-outline">
                {{ form.last_name }}
              <label class="form-label" for="form8Example3">Last name</label>
            </div>
          </div>
          <div class="col">
            <!-- Name input -->
            <div data-mdb-input-init class="form-outline">
              {{ form.telephone }}
              <label class="form-label" for="form8Example4">Phone</label>
            </div>
          </div>
          <div class="col">
            <!-- Email input -->
            <div data-mdb-input-init class="form-outline">
                {{ form.status }}
              <label class="form-label" for="form8Example5">Status</label>
            </div>
          </div>
        </div>
            <input type="submit" value="Save" class="btn btn-primary">
        </form>
    </section>
{% endblock %}
